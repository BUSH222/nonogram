<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nonogram - Game</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<div id="nonogram" class="loading" aria-busy="true">
  <div id="top-row">
    <div id="corner"></div>
    <div id="col-hints"></div>
  </div>
  <div id="middle-row">
    <div id="row-hints"></div>
    <div id="grid-wrap">
      <div id="grid"></div>
    </div>
  </div>
  <div id="details"></div>
  <div id="status-msg" aria-live="polite">Connecting to saved game...</div>
  <div id="error-msg" aria-live="polite"></div>
</div>

<script src="/static/game.js"></script>
</body>
</html>
