<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nonogram - New Game</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<div id="menu-container">
  <h1 id="menu-title">Nonogram</h1>
  
  <form id="game-form">
    <div class="form-row">
      <div class="form-group">
        <label for="rows">Rows</label>
        <input type="number" id="rows" name="rows" min="3" max="99" value="15" required />
      </div>
      <div class="form-group">
        <label for="cols">Columns</label>
        <input type="number" id="cols" name="cols" min="3" max="99" value="15" required />
      </div>
    </div>

    <div class="form-group">
      <label for="seed">Random seed</label>
      <input type="text" id="seed" name="seed" />
    </div>
    
    <div class="form-group">
      <label for="density">
        Density: <span class="density-display" id="density-value">0.50</span>
      </label>
      <input type="range" id="density" name="density" min="0.3" max="0.7" step="0.01" value="0.5" />
    </div>
    
    <div class="form-group">
      <label for="random-function">Random Function</label>
      <select id="random-function" name="random_function" required>
        <option value="perlin2d">Perlin 2D</option>
        <option value="random">Random</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="frequency">Frequency</label>
      <input type="number" id="frequency" name="frequency" min="1" max="20" value="6" required />
    </div>
    
    <button type="submit" id="submit-btn">Start Game</button>
  </form>

  <div id="form-status" aria-live="polite"></div>
</div>

<script>
  const densityDisplay = document.getElementById('density-value');
  const densityInput = document.getElementById('density');
  const gameForm = document.getElementById('game-form');
  const submitButton = document.getElementById('submit-btn');
  const formStatus = document.getElementById('form-status');
  
  densityInput.addEventListener('input', (event) => {
    densityDisplay.textContent = parseFloat(event.target.value).toFixed(2);
  });
  
  gameForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    const originalLabel = submitButton.textContent;
    const params = new URLSearchParams();
    params.set('rows', document.getElementById('rows').value);
    params.set('cols', document.getElementById('cols').value);
    params.set('density', document.getElementById('density').value);
    params.set('random_function', document.getElementById('random-function').value);
    params.set('frequency', document.getElementById('frequency').value);

    const seed = document.getElementById('seed').value.trim();
    if (seed) {
      params.set('seed', seed);
    }

    submitButton.disabled = true;
    submitButton.textContent = 'Creating...';
    formStatus.textContent = 'Creating game...';

    try {
      const response = await fetch(`/new?${params.toString()}`);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      if (!data.game_id) {
        throw new Error('Missing game id');
      }

      window.location.assign(`/game?id=${encodeURIComponent(data.game_id)}`);
    } catch (error) {
      const message = `Failed to create game: ${error.message}`;
      formStatus.textContent = message;
      alert(message);
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = originalLabel;
    }
  });
</script>
</body>
</html>
